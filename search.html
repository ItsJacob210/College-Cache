<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Cache · Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container container--wide">
        <header class="app-header app-header--subpage" aria-label="Top">
            <nav class="app-header__nav" aria-label="Main">
                <a href="dashboard.html"><span class="brand">College Cache</span></a>
                <a href="search.html">Search</a>
                <a href="report-lost.html">Report Lost</a>
                <a href="report-found.html">Report Found</a>
                <a href="my-reports.html">My Reports</a>
            </nav>
        </header>

        <h1>Search Items</h1>
        <p class="intro intro--tight">Search public reports. Sensitive details only appear after a verified claim.</p>

        <form id="filterForm" novalidate>
            <div class="filter-row">
                <div class="input-group">
                    <label for="q">Keyword</label>
                    <input type="text" id="q" placeholder="title, description, area">
                </div>
                <div class="input-group">
                    <label for="type">Type</label>
                    <select id="type">
                        <option value="">All</option>
                        <option value="LOST">Lost</option>
                        <option value="FOUND">Found</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="category">Category</label>
                    <select id="category"></select>
                </div>
                <div class="input-group">
                    <label for="location">Area</label>
                    <select id="location"></select>
                </div>
            </div>

            <div class="filter-row">
                <div class="input-group">
                    <label for="from">From</label>
                    <input type="date" id="from">
                </div>
                <div class="input-group">
                    <label for="to">To</label>
                    <input type="date" id="to">
                </div>
                <div class="input-group">
                    <label>&nbsp;</label>
                    <button type="submit">Apply filters</button>
                </div>
                <div class="input-group">
                    <label>&nbsp;</label>
                    <button type="button" class="btn-secondary btn-block" id="btnReset">Reset</button>
                </div>
            </div>
        </form>

        <p id="resultMsg" class="message" role="status" aria-live="polite"></p>

        <div id="cardGrid" class="card-grid"></div>
        <p id="emptyState" class="empty-state" hidden>No reports match your search.</p>
    </div>

    <script src="js/cc-utils.js"></script>
    <script>
        (function () {
            CC.requireLogin();

            CC.populateSelect(document.getElementById("category"), CC.CATEGORIES, "Any category");
            CC.populateSelect(document.getElementById("location"), CC.LOCATIONS, "Any area");

            var grid = document.getElementById("cardGrid");
            var empty = document.getElementById("emptyState");
            var msg = document.getElementById("resultMsg");

            function loadFromForm() {
                var qs = new URLSearchParams();
                var q = document.getElementById("q").value.trim();
                if (q) qs.set("q", q);
                var type = document.getElementById("type").value;
                if (type) qs.set("type", type);
                var cat = document.getElementById("category").value;
                if (cat) qs.set("category", cat);
                var loc = document.getElementById("location").value;
                if (loc) qs.set("location", loc);
                var from = document.getElementById("from").value;
                if (from) qs.set("from", from);
                var to = document.getElementById("to").value;
                if (to) qs.set("to", to);

                grid.innerHTML = "";
                empty.hidden = true;
                msg.textContent = "Loading…";
                msg.className = "message";

                fetch("/getItemReports?" + qs.toString())
                    .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
                    .then(function (items) {
                        msg.textContent = items.length + " result(s).";
                        if (!items.length) { empty.hidden = false; return; }
                        items.forEach(function (it) { grid.appendChild(CC.itemCard(it)); });
                    })
                    .catch(function () {
                        msg.textContent = "Could not load search results.";
                        msg.className = "message message--error";
                    });
            }

            document.getElementById("filterForm").addEventListener("submit", function (e) {
                e.preventDefault();
                loadFromForm();
            });

            document.getElementById("btnReset").addEventListener("click", function () {
                document.getElementById("filterForm").reset();
                loadFromForm();
            });

            loadFromForm();
        })();
    </script>
</body>
</html>
