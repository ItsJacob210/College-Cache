<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Cache · Log in</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1><span class="brand">College Cache</span></h1>
        <p class="intro">Campus lost &amp; found for verified university users. Log in with your school email.</p>
        <form id="loginForm" action="#" method="post" novalidate>
            <div class="input-group">
                <label for="email">University email</label>
                <input type="email" id="email" name="email" placeholder="you@school.edu" autocomplete="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <p id="loginMessage" class="message" role="status" aria-live="polite"></p>
            <button type="submit">Log in</button>
        </form>
        <p class="bottom-link">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script>
        (function () {
            if (localStorage.getItem("loggedInUser")) {
                window.location.replace("dashboard.html");
                return;
            }

            var form = document.getElementById("loginForm");
            var messageEl = document.getElementById("loginMessage");
            var EDU = /^[^\s@]+@[^\s@]+\.edu$/i;

            form.addEventListener("submit", function (e) {
                e.preventDefault();
                messageEl.textContent = "";
                messageEl.className = "message";

                var email = document.getElementById("email").value.trim();
                var password = document.getElementById("password").value;

                if (!EDU.test(email)) {
                    messageEl.textContent = "Please use a valid university (.edu) email.";
                    messageEl.classList.add("message--error");
                    return;
                }

                fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                })
                    .then(function (res) {
                        if (!res.ok) throw new Error();
                        return res.json();
                    })
                    .then(function (data) {
                        if (data && data._id) {
                            localStorage.setItem("loggedInUser", data._id);
                            localStorage.setItem("loggedInEmail", data.email || "");
                            localStorage.setItem("loggedInRole", data.role || "STUDENT");
                            localStorage.setItem("loggedInName", ((data.firstName || "") + " " + (data.lastName || "")).trim());
                            window.location.href = "dashboard.html";
                            return;
                        }
                        messageEl.textContent = "Invalid email or password.";
                        messageEl.classList.add("message--error");
                    })
                    .catch(function () {
                        messageEl.textContent = "Invalid email or password.";
                        messageEl.classList.add("message--error");
                    });
            });
        })();
    </script>
</body>
</html>
